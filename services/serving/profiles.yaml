# Named hardware profiles for the model gateway.
#
# Sampling is per-model per-role — no global policy, no temperature-0
# requirement anywhere. The experiment config hash covers the role/sampling
# block, so changing any value here (copied into an experiment config) makes
# a distinct experiment by construction.
#
# Serving reality (smoked 2026-07-03 from Theseus): metis + athena, both
# LM Studio-class OpenAI-compatible endpoints on :1240 over Tailscale, both
# serving qwen3.6-35b-a3b-mtp (a thinking model) for both tiers, plus
# nomic-embed-text-v1.5 (768-dim, matches vector(768) in schema.sql).
#
# Thinking-model facts (measured; see decisionLog 2026-07-03):
#   - request-level enable_thinking / reasoning flags are IGNORED by both
#     servers; request_extras carries enable_thinking best-effort anyway.
#   - metis shunts grammar-constrained (json_schema) output into
#     reasoning_content with empty content — the gateway salvages it. Net
#     effect: structured calls on metis skip thinking (~35 tokens/call).
#   - athena thinks first (~300-1000 tokens), then emits valid JSON in
#     content. max_tokens below are CAPS sized to fit reasoning + answer;
#     they are not spend targets.
#
# Judge tier (offline believability scoring) is deliberately absent: it is a
# generic LLM-as-judge chosen at judge time and is never on the hot path.
profiles:
  metis:
    base_url: http://metis.tail6ebd6b.ts.net:1240/v1
    request_extras:
      enable_thinking: false
    tiers:
      fast: # same model both tiers; the split survives in the role mapping
        model: qwen3.6-35b-a3b-mtp
      slow:
        model: qwen3.6-35b-a3b-mtp
    embedding:
      base_url: http://metis.tail6ebd6b.ts.net:1240/v1
      model: text-embedding-nomic-embed-text-v1.5
      dim: 768
    roles:
      dialogue:
        tier: fast
        sampling: {temperature: 0.9, top_p: 0.95, max_tokens: 2048}
      importance:
        tier: fast
        sampling: {temperature: 0.2, max_tokens: 1024}
      action_selection:
        tier: fast
        sampling: {temperature: 0.7, top_p: 0.95, max_tokens: 2048}
      reflection:
        tier: slow
        sampling: {temperature: 0.8, top_p: 0.95, max_tokens: 4096}
      daily_planning:
        tier: slow
        sampling: {temperature: 0.8, top_p: 0.95, max_tokens: 4096}
      decomposition:
        tier: slow
        sampling: {temperature: 0.6, top_p: 0.95, max_tokens: 4096}
      probe: # measurement plane: frozen-state interviews/fact checks; never on the sim's hot path
        tier: fast
        sampling: {temperature: 0.3, top_p: 0.95, max_tokens: 2048}

  athena:
    base_url: http://athena.tail6ebd6b.ts.net:1240/v1
    request_extras:
      enable_thinking: false
    tiers:
      fast:
        model: qwen3.6-35b-a3b-mtp
      slow:
        model: qwen3.6-35b-a3b-mtp
    embedding:
      base_url: http://athena.tail6ebd6b.ts.net:1240/v1
      model: text-embedding-nomic-embed-text-v1.5
      dim: 768
    roles:
      dialogue:
        tier: fast
        sampling: {temperature: 0.9, top_p: 0.95, max_tokens: 2048}
      importance:
        tier: fast
        sampling: {temperature: 0.2, max_tokens: 1024}
      action_selection:
        tier: fast
        sampling: {temperature: 0.7, top_p: 0.95, max_tokens: 2048}
      reflection:
        tier: slow
        sampling: {temperature: 0.8, top_p: 0.95, max_tokens: 4096}
      daily_planning:
        tier: slow
        sampling: {temperature: 0.8, top_p: 0.95, max_tokens: 4096}
      decomposition:
        tier: slow
        sampling: {temperature: 0.6, top_p: 0.95, max_tokens: 4096}
      probe:
        tier: fast
        sampling: {temperature: 0.3, top_p: 0.95, max_tokens: 2048}
